name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: packages/sdk
        run: npm ci

      - name: Type check SDK
        working-directory: packages/sdk
        run: npm run lint

      - name: Build SDK
        working-directory: packages/sdk
        run: npm run build

  sdk-sync-check:
    runs-on: ubuntu-latest
    # Only run when API source files change (not on dependency-only updates)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install SDK dependencies
        working-directory: packages/sdk
        run: npm ci

      - name: Build gateway (needed for schema export)
        run: npm run build

      - name: Export OpenAPI schema
        run: npm run openapi:export

      - name: Regenerate SDK from schema
        run: cd packages/sdk && npm run generate && sed -i "s|from '../fetch-mutator'|from '../fetch-mutator.js'|g" src/generated/api.ts

      - name: Check for uncommitted changes
        run: |
          if git diff --name-only | grep -q "packages/sdk/src/generated"; then
            echo "❌ SDK is out of sync with OpenAPI schema!"
            echo "Run 'npm run sdk:generate' and commit the changes."
            git diff --stat packages/sdk/src/generated/
            exit 1
          fi
          echo "✅ SDK is in sync with OpenAPI schema"
