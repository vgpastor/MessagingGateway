name: n8n Nodes Publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/n8n-nodes/package.json'

jobs:
  detect-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./packages/n8n-nodes/package.json').version")
          PREVIOUS=$(git show HEAD~1:packages/n8n-nodes/package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: packages/n8n-nodes/package-lock.json

      - name: Upgrade npm for OIDC support
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Current npm: $(npm -v)"
          echo "npm $(npm -v)"
          echo "Updated npm: $(npm -v)"

      - name: Configure npm registry
        if: steps.check.outputs.changed == 'true'
        run: npm config set registry https://registry.npmjs.org/

      - name: Install and build
        if: steps.check.outputs.changed == 'true'
        working-directory: packages/n8n-nodes
        run: npm install && npm run build

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.changed == 'true'
        working-directory: packages/n8n-nodes
        run: npm publish --access public --provenance
