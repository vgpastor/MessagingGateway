name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'packages/sdk/package.json'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway_changed: ${{ steps.check.outputs.gateway_changed }}
      gateway_version: ${{ steps.check.outputs.gateway_version }}
      sdk_changed: ${{ steps.check.outputs.sdk_changed }}
      sdk_version: ${{ steps.check.outputs.sdk_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes
        id: check
        run: |
          # Gateway version
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "gateway_changed=true" >> "$GITHUB_OUTPUT"
            echo "Gateway version changed: $PREVIOUS → $CURRENT"
          else
            echo "gateway_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "gateway_version=$CURRENT" >> "$GITHUB_OUTPUT"

          # SDK version
          SDK_CURRENT=$(node -p "require('./packages/sdk/package.json').version")
          SDK_PREVIOUS=$(git show HEAD~1:packages/sdk/package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$SDK_CURRENT" != "$SDK_PREVIOUS" ] && [ -n "$SDK_PREVIOUS" ]; then
            echo "sdk_changed=true" >> "$GITHUB_OUTPUT"
            echo "SDK version changed: $SDK_PREVIOUS → $SDK_CURRENT"
          else
            echo "sdk_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "sdk_version=$SDK_CURRENT" >> "$GITHUB_OUTPUT"

  release-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Git tag
        run: |
          git tag "v${{ needs.detect-changes.outputs.gateway_version }}"
          git push origin "v${{ needs.detect-changes.outputs.gateway_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.detect-changes.outputs.gateway_version }}" \
            --title "v${{ needs.detect-changes.outputs.gateway_version }}" \
            --generate-notes \
            --latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: vgpastor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vgpastor/messaginggateway:${{ needs.detect-changes.outputs.gateway_version }}
            ghcr.io/vgpastor/messaginggateway:latest
            vgpastor/messaging-gateway:${{ needs.detect-changes.outputs.gateway_version }}
            vgpastor/messaging-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  release-sdk:
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: packages/sdk
        run: npm ci

      - name: Build
        working-directory: packages/sdk
        run: npm run build

      - name: Publish to npm (OIDC)
        working-directory: packages/sdk
        run: npm publish --provenance --access public

      - name: Create Git tag
        run: |
          git tag "sdk-v${{ needs.detect-changes.outputs.sdk_version }}"
          git push origin "sdk-v${{ needs.detect-changes.outputs.sdk_version }}"
