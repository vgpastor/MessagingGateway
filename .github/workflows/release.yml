name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway_changed: ${{ steps.check.outputs.gateway_changed }}
      gateway_version: ${{ steps.check.outputs.gateway_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version changes
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ] && [ -n "$PREVIOUS" ]; then
            echo "gateway_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "gateway_changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "gateway_version=$CURRENT" >> "$GITHUB_OUTPUT"

  release-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Git tag
        run: |
          git tag "v${{ needs.detect-changes.outputs.gateway_version }}"
          git push origin "v${{ needs.detect-changes.outputs.gateway_version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.detect-changes.outputs.gateway_version }}" \
            --title "v${{ needs.detect-changes.outputs.gateway_version }}" \
            --generate-notes \
            --latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: vgpastor
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vgpastor/messaginggateway:${{ needs.detect-changes.outputs.gateway_version }}
            ghcr.io/vgpastor/messaginggateway:latest
            vgpastor/messaging-gateway:${{ needs.detect-changes.outputs.gateway_version }}
            vgpastor/messaging-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
