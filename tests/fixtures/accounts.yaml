accounts:
  # === WHATSAPP ===
  - id: wa-acme
    alias: "Acme WhatsApp"
    channel: whatsapp
    provider: wwebjs-api
    identity:
      phoneNumber: "+14155550001"
    credentialsRef: WWEBJS_ACME
    providerConfig:
      baseUrl: http://wwebjs-acme:3001
      sessionId: acme
    metadata:
      owner: acme-corp
      environment: production
      tags: [acme, support]

  - id: wa-test
    alias: "Test WhatsApp"
    channel: whatsapp
    provider: wwebjs-api
    identity:
      phoneNumber: "+14155550002"
    credentialsRef: WWEBJS_TEST
    providerConfig:
      baseUrl: http://wwebjs-test:3002
      sessionId: test
    metadata:
      owner: test-org
      environment: production
      tags: [test, security]

  - id: wa-demo
    alias: "Demo WhatsApp"
    channel: whatsapp
    provider: wwebjs-api
    identity:
      phoneNumber: "+14155550003"
    credentialsRef: WWEBJS_DEMO
    providerConfig:
      baseUrl: http://wwebjs-demo:3003
      sessionId: demo
    metadata:
      owner: demo-org
      environment: production
      tags: [demo, global]

  - id: wa-baileys
    alias: "Baileys WhatsApp"
    channel: whatsapp
    provider: baileys
    identity:
      phoneNumber: "+14155550004"
    credentialsRef: BAILEYS_TEST
    metadata:
      owner: test-org
      environment: production
      tags: [baileys, whatsapp]

  # === TELEGRAM ===
  - id: tg-alerts-bot
    alias: "Alerts Bot"
    channel: telegram
    provider: telegram-bot-api
    identity:
      botUsername: test_alerts_bot
    credentialsRef: TG_ALERTS
    metadata:
      owner: test-org
      environment: production
      tags: [alerts, bot]

  - id: tg-support-bot
    alias: "Support Bot"
    channel: telegram
    provider: telegram-bot-api
    identity:
      botUsername: test_support_bot
    credentialsRef: TG_SUPPORT_BOT
    metadata:
      owner: test-org
      environment: production
      tags: [support, bot]

  # === EMAIL ===
  - id: email-support
    alias: "Support Email"
    channel: email
    provider: brevo
    identity:
      address: support@example.com
    credentialsRef: BREVO_MAIN
    providerConfig:
      senderName: "Acme Support"
    metadata:
      owner: acme-corp
      environment: production
      tags: [support, email]

  - id: email-noreply
    alias: "No Reply"
    channel: email
    provider: brevo
    identity:
      address: noreply@example.com
    credentialsRef: BREVO_MAIN
    providerConfig:
      senderName: "Acme Corp"
    metadata:
      owner: acme-corp
      environment: production
      tags: [noreply, system]

  # === SMS ===
  - id: sms-alerts
    alias: "SMS Alerts (Twilio)"
    channel: sms
    provider: twilio
    identity:
      phoneNumber: "+14155550010"
    credentialsRef: TWILIO_ALERTS
    providerConfig:
      accountSid: "${TWILIO_ALERTS_ACCOUNT_SID}"
    metadata:
      owner: acme-corp
      environment: production
      tags: [alerts, twilio]

  - id: sms-support
    alias: "SMS Support (MessageBird)"
    channel: sms
    provider: messagebird
    identity:
      phoneNumber: "+14155550011"
    credentialsRef: MESSAGEBIRD_SUPPORT
    metadata:
      owner: acme-corp
      environment: production
      tags: [support, messagebird]
