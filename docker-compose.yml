services:
  gateway:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      ACCOUNTS_CONFIG_PATH: /app/config/accounts.yaml
    volumes:
      # Mount custom accounts config (optional override)
      - ./src/infrastructure/config/accounts.yaml:/app/config/accounts.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
