services:
  gateway:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      ACCOUNTS_CONFIG_PATH: /app/config/accounts.yaml
    volumes:
      # Mount the config directory (not a single file) to avoid Docker
      # creating accounts.yaml as a directory when the host file is absent.
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
